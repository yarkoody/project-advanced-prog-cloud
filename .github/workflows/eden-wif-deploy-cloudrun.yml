# Workflow purpose: deploy to Cloud Run using Workload Identity Federation (WIF).
name: Deploy to Cloud Run (Eden WIF)

on:
    workflow_dispatch:
        inputs:
            image_tag:
                description: "Docker image tag or digest to deploy (for example: commit SHA or sha256:...)"
                required: true

jobs:
    deploy-cloud-run:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            id-token: write

        env:
            PROJECT_ID: vehicle-sharing-api-cloud
            REGION: us-central1
            REPOSITORY: fleet-api
            IMAGE: vehicle-api
            SERVICE: fleet-api

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v3
              with:
                  workload_identity_provider: ${{ secrets.EDEN_GCP_WORKLOAD_IDENTITY_PROVIDER }}
                  service_account: ${{ secrets.EDEN_GCP_SERVICE_ACCOUNT }}

            - name: Set up gcloud
              uses: google-github-actions/setup-gcloud@v3

            - name: Set image URI
              run: |
                  INPUT="${{ github.event.inputs.image_tag }}"
                  BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}"

                  if [[ "$INPUT" == sha256:* ]]; then
                    echo "IMAGE_URI=${BASE}@${INPUT}" >> "$GITHUB_ENV"
                  elif [[ "$INPUT" == @sha256:* ]]; then
                    echo "IMAGE_URI=${BASE}${INPUT}" >> "$GITHUB_ENV"
                  else
                    echo "IMAGE_URI=${BASE}:${INPUT}" >> "$GITHUB_ENV"
                  fi

            - name: Deploy to Cloud Run
              run: |
                  gcloud run deploy "${{ env.SERVICE }}" \
                    --image "${IMAGE_URI}" \
                    --region "${{ env.REGION }}" \
                    --project "${{ env.PROJECT_ID }}" \
                    --platform managed \
                    --allow-unauthenticated

            - name: Show service URL
              run: |
                  gcloud run services describe "${{ env.SERVICE }}" \
                    --region "${{ env.REGION }}" \
                    --project "${{ env.PROJECT_ID }}" \
                    --format='value(status.url)'
