name: Deploy to Cloud Run (Eden WIF)

on:
    workflow_dispatch:
        inputs:
            image_tag:
                description: "Docker image tag to deploy"
                required: true

jobs:
    deploy-cloud-run:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            id-token: write

        env:
            PROJECT_ID: vehicle-sharing-api-cloud
            REGION: us-central1
            REPOSITORY: fleet-api
            IMAGE: vehicle-api
            SERVICE: fleet-api

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: ${{ secrets.EDEN_GCP_WORKLOAD_IDENTITY_PROVIDER }}
                  service_account: ${{ secrets.EDEN_GCP_SERVICE_ACCOUNT }}

            - name: Set up gcloud
              uses: google-github-actions/setup-gcloud@v3

            - name: Set image URI
              run: |
                  echo "IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.event.inputs.image_tag }}" >> "$GITHUB_ENV"

            - name: Deploy to Cloud Run
              run: |
                  gcloud run deploy "${{ env.SERVICE }}" \
                    --image "${IMAGE_URI}" \
                    --region "${{ env.REGION }}" \
                    --project "${{ env.PROJECT_ID }}" \
                    --platform managed \
                    --allow-unauthenticated

            - name: Show service URL
              run: |
                  gcloud run services describe "${{ env.SERVICE }}" \
                    --region "${{ env.REGION }}" \
                    --project "${{ env.PROJECT_ID }}" \
                    --format='value(status.url)'
