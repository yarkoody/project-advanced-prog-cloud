name: Publish Image (Eden WIF)

on:
    workflow_dispatch:
    push:
        branches: [main]

jobs:
    image-publish:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            id-token: write

        env:
            PROJECT_ID: ${{ secrets.EDEN_GCP_PROJECT_ID }}
            REGION: us-central1
            REPOSITORY: fleet-api
            IMAGE: vehicle-api

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v3
              with:
                  workload_identity_provider: ${{ secrets.EDEN_GCP_WORKLOAD_IDENTITY_PROVIDER }}
                  service_account: ${{ secrets.EDEN_GCP_SERVICE_ACCOUNT }}

            - name: Set up gcloud
              uses: google-github-actions/setup-gcloud@v3

            - name: Configure Docker auth for Artifact Registry
              run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  platforms: linux/amd64
                  tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
